services:
  postgres:
    image: postgres:16-alpine
    container_name: zeroburn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeroburn
      POSTGRES_PASSWORD: zeroburn
      POSTGRES_DB: zeroburn
    ports:
      - "5432:5432"
    volumes:
      - zeroburn-postgres-data:/var/lib/postgresql/data

volumes:
  zeroburn-postgres-data:
