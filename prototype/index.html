    .app{display:grid;grid-template-columns:292px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:24px 18px;border-right:1px solid var(--line);background:rgba(255,255,255,.78);backdrop-filter:blur(22px);display:flex;flex-direction:column;gap:24px}.brand{display:flex;gap:12px;align-items:center}.mark,.icon{display:grid;place-items:center}.mark{width:48px;height:48px;border-radius:18px;color:var(--green);background:linear-gradient(145deg,#ddf5e5,#fff);box-shadow:var(--shadow)}.brand strong{display:block;color:var(--green-d);font-size:22px;line-height:1.04}.brand span,.muted,small{color:var(--muted)}.brand span{font-size:12px}.nav{display:grid;gap:6px}.nav a{display:flex;gap:13px;align-items:center;height:46px;padding:0 14px;border-radius:16px;color:#304238;font-weight:800}.nav a.active,.nav a:hover{color:var(--green-d);background:linear-gradient(90deg,rgba(21,148,71,.16),rgba(21,148,71,.05))}.farmer{margin-top:auto;padding:16px;border-radius:22px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}.avatar{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#dff2e2,#fff8df);color:var(--green-d);font-weight:900}.main{min-width:0}.top{position:sticky;top:0;z-index:10;display:grid;grid-template-columns:minmax(260px,1fr) auto auto auto;gap:14px;align-items:center;padding:18px 24px;border-bottom:1px solid var(--line);background:rgba(246,248,243,.84);backdrop-filter:blur(22px)}.search,.filter label{display:flex;align-items:center;gap:10px;height:46px;padding:0 14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.78)}input,select{border:0;outline:0;background:transparent;width:100%;color:var(--text)}.btn,.pill,select{min-height:42px;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.86);padding:0 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:850}.btn.primary{background:linear-gradient(180deg,#19a951,var(--green-d));border-color:transparent;color:white;box-shadow:0 12px 24px rgba(21,148,71,.22)}.btn.warn{background:var(--amber);border-color:transparent}.page{padding:24px;max-width:1700px;margin:0 auto}.title{display:flex;justify-content:space-between;gap:18px;align-items:end;margin-bottom:20px}.title p{margin:0 0 6px;color:var(--muted);font-size:14px;font-weight:800}.title h1{margin:0;font-size:clamp(28px,2.4vw,34px);line-height:1.08}.actions{display:flex;gap:10px;flex-wrap:wrap}.metrics{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:16px;margin-bottom:18px}.metric,.panel,.item,.listing,.cert{border-radius:24px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.metric{min-height:120px;padding:18px;display:flex;gap:14px}.bubble{width:44px;height:44px;border-radius:17px;display:grid;place-items:center;background:var(--green-s);color:var(--green-d);flex:0 0 auto}.bubble.blue{background:var(--blue-s);color:var(--blue)}.bubble.amber{background:var(--amber-s);color:var(--amber)}.bubble.red{background:var(--red-s);color:var(--red)}.metric strong{display:block;font-size:24px;margin:7px 0 4px}.metric span,.metric small{font-size:12px;font-weight:800}.grid3{display:grid;grid-template-columns:260px minmax(360px,1fr) 250px;gap:18px;align-items:start}.panel{padding:18px;margin-bottom:18px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.head h2{margin:0;font-size:18px}.stack{display:grid;gap:12px}.plot{width:100%;display:grid;grid-template-columns:auto minmax(0,1fr);gap:12px;align-items:center;text-align:left;padding:12px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.7)}.plot .status{grid-column:2;justify-self:start}.plot.selected{border-color:rgba(21,148,71,.55);box-shadow:0 0 0 3px rgba(21,148,71,.09)}.thumb{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(145deg,#dbf0cd,#faf2c4)}.status{display:inline-flex;align-items:center;justify-content:center;min-height:26px;padding:0 10px;border-radius:99px;font-size:11px;font-weight:900;text-transform:capitalize;white-space:nowrap}.verified,.complete,.available,.linked,.active{color:var(--green-d);background:var(--green-s)}.pending,.monitoring,.draft,.submitted,.waiting-review{color:#9a6500;background:var(--amber-s)}.flagged,.rejected,.incomplete{color:#b22323;background:var(--red-s)}.sold,.listed,.offer{color:var(--blue);background:var(--blue-s)}
    .map{position:relative;min-height:390px;border-radius:24px;overflow:hidden;background:#dbeed8;box-shadow:inset 0 0 0 1px var(--line)}.map.tall{min-height:560px}.map svg{width:100%;height:100%;min-height:inherit;display:block}.toolbar{position:absolute;top:16px;left:16px;z-index:2;display:flex;gap:10px;flex-wrap:wrap}.legend{position:absolute;left:16px;bottom:16px;display:flex;gap:16px;flex-wrap:wrap;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.86);box-shadow:var(--shadow)}.legend span{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800}.dot{width:10px;height:10px;border-radius:50%;background:var(--green)}.dot.pending{background:var(--amber)}.dot.flagged{background:var(--red)}.shape{stroke-width:4;stroke:white;cursor:pointer}.shape.verified{fill:rgba(44,159,69,.52);stroke:#73d36d}.shape.pending{fill:rgba(47,125,217,.42);stroke:#69aeff}.shape.flagged{fill:rgba(232,154,18,.52);stroke:#ffbd42}.shape.selected{filter:drop-shadow(0 0 14px rgba(255,255,255,.95));stroke-width:7}.label{fill:white;font-size:23px;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.35);pointer-events:none}.split,.two{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,.8fr);gap:18px;align-items:start}.quick{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.quick button{min-height:70px;border:1px solid var(--line);border-radius:18px;background:#fff;font-weight:900;color:var(--green-d)}.timeline{display:grid;gap:12px}.tl{display:grid;grid-template-columns:32px 1fr;gap:10px}.tl i{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--green-s);color:var(--green-d);font-style:normal;font-weight:900}.tl p{margin:0;font-weight:800}.tl small{grid-column:2;margin-top:-8px}.filter{display:grid;grid-template-columns:minmax(220px,1fr) repeat(3,minmax(130px,180px)) auto;gap:12px;margin-bottom:18px}.mapgrid{display:grid;grid-template-columns:300px minmax(420px,1fr) 340px;gap:18px;align-items:start}.details{display:grid;gap:12px;margin-top:0}.details div{display:flex;justify-content:space-between;gap:12px;align-items:center;padding-bottom:10px;border-bottom:1px solid rgba(24,63,40,.08)}.table{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:14px 12px;border-bottom:1px solid rgba(24,63,40,.09);text-align:left;font-size:14px}th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.item,.listing,.cert{padding:16px;display:grid;gap:12px}.qr{width:92px;height:92px;padding:8px;display:grid;grid-template-columns:repeat(7,1fr);gap:3px;background:white;border:1px solid var(--line);border-radius:14px}.qr i{border-radius:2px;background:#edf2ee}.qr i.on{background:#102617}.mobile{display:none}.modal{position:fixed;inset:0;z-index:50;display:none;place-items:center;padding:20px;background:rgba(16,32,23,.24);backdrop-filter:blur(8px)}.modal.open{display:grid}.modalbox{width:min(620px,100%);border-radius:28px;background:white;padding:22px;box-shadow:0 28px 90px rgba(20,48,30,.24)}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.form label{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:800}.form input{min-height:44px;border:1px solid var(--line);border-radius:14px;padding:0 12px;background:#f9fbf7}.form .btn{grid-column:1/-1}
    @media(max-width:1100px){.app{grid-template-columns:250px 1fr}.grid3,.mapgrid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.plotrail .stack{grid-template-columns:repeat(3,1fr)}.two,.split{grid-template-columns:1fr}}@media(max-width:860px){.app{display:block;padding-bottom:86px}.side{display:none}.top{grid-template-columns:1fr auto auto;padding:14px 16px}.top .search{grid-column:1/-1;order:2}.top .hide-sm{display:none}.page{padding:18px 16px}.title{align-items:start;flex-direction:column}.metrics,.filter,.quick,.cards{grid-template-columns:1fr}.plotrail .stack{grid-template-columns:1fr}.mobile{position:fixed;z-index:40;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(6,1fr);padding:9px 10px;background:rgba(255,255,255,.9);border-top:1px solid var(--line);backdrop-filter:blur(20px)}.mobile a{display:grid;justify-items:center;gap:4px;color:var(--muted);font-size:11px;font-weight:800}.mobile a.active{color:var(--green-d)}.form{grid-template-columns:1fr}}
  </style>

<body>
  <div class="app">
    <aside class="side"><div class="brand"><div class="mark">🌿</div><div><strong>Zero-Burn Farmer</strong><span>Traceable. Sustainable. Profitable.</span></div></div><nav class="nav" id="nav"></nav><div class="farmer"><div class="avatar">SF</div><h3>Somchai Farm</h3><p class="muted">Farm ID: ZBF-24781</p><p>Province <b style="float:right">Nakhon Sawan</b></p><p>Total plots <b style="float:right">3</b></p><p>Total area <b style="float:right">35 rai</b></p></div></aside>
    <section class="main"><header class="top"><label class="search">⌕<input placeholder="Search plots, records, certificates..." id="search"></label><button class="btn">▣ Season 2025/26</button><button class="btn">🔔 3</button><button class="btn primary hide-sm" onclick="openModal('Quick Action')">＋ Quick Action</button></header><main class="page" id="app"></main></section>
    <nav class="mobile" id="mobile"></nav>
  </div>
  <div class="modal" id="modal"><div class="modalbox"><div class="head"><h2 id="modal-title">Form</h2><button class="btn" onclick="closeModal()">×</button></div><div id="modal-body"></div></div></div>
  <script>
    const plots=[{id:'plot-a',name:'Plot A',cropType:'Sugarcane',areaRai:12,gps:'15.2762, 100.1344',plantingDate:'12 Jun 2025',expectedHarvestDate:'20 Nov 2025',actualHarvestDate:'18 Nov 2025',harvestQuantity:'20 tons',status:'verified',tokenLotId:'ZBT-2026-001',productLotId:'ZB-2026-001',certificateId:'CERT-ZB-001',risk:'Low',poly:'250,92 432,66 520,158 470,280 300,300 212,210'},{id:'plot-b',name:'Plot B',cropType:'Sugarcane',areaRai:8,gps:'15.2827, 100.1210',plantingDate:'25 Jun 2025',expectedHarvestDate:'05 Dec 2025',actualHarvestDate:'Pending',harvestQuantity:'Pending',status:'pending',tokenLotId:'Pending issue',productLotId:'Not linked',certificateId:'Pending',risk:'Medium',poly:'80,240 238,198 326,292 278,405 106,384'},{id:'plot-c',name:'Plot C',cropType:'Sugarcane',areaRai:15,gps:'15.2709, 100.1518',plantingDate:'03 Jul 2025',expectedHarvestDate:'17 Dec 2025',actualHarvestDate:'16 Dec 2025',harvestQuantity:'15 tons',status:'flagged',tokenLotId:'Review hold',productLotId:'ZB-2026-002',certificateId:'Review hold',risk:'High',poly:'520,286 704,240 792,332 740,456 556,440'}];
    const summary=[['▦','Registered Plots',3,'35 rai total',''],['🛡','Verified Plots',1,'Zero-Burn passed',''],['✓','Pending Review',1,'Needs proof','amber'],['🔥','Flagged Plots',1,'Review needed','red'],['🌾','Total Harvest','35 tons','This season','blue'],['◎','Token Balance','180 ZBT','120 available',''],['฿','Revenue from Produce','฿314,000','Mock sales','blue'],['◎','Revenue from Tokens','฿48,750','60 sold','']];
    const pages=[['dashboard','Dashboard'],['plots','My Plots'],['plot-detail','Plot Detail'],['planting','Planting Records'],['harvest','Harvest Records'],['verification','Verification'],['wallet','Token Wallet'],['marketplace','Marketplace'],['certificates','Certificates'],['profile','Profile']];
    const mobile=[['dashboard','Home'],['plots','Plots'],['planting','Records'],['wallet','Wallet'],['profile','Profile'],['marketplace','More']];
    const activities=['Plot A verified successfully','Harvest record linked to 50 ZBT','Plot B submitted for review','Marketplace listing MKT-001 received buyer interest','Plot C flagged for verification review'];
    const tokens=[['ZBT-2026-001','Plot A','20 tons','50 ZBT','linked','ZB-2026-001'],['ZBT-2026-002','Plot A','12 tons','70 ZBT','available','Unlinked'],['ZBT-2025-SOLD','Plot C','18 tons','60 ZBT','sold','ZB-2025-009']];
    const listings=[['MKT-001','Sugarcane','20 tons','฿176,000','Plot A','Verified Zero-Burn','Token attached','active'],['MKT-002','Sugarcane','15 tons','฿138,000','Plot C','Flagged review','Attach token','draft']];
    let selected='plot-a';let mode='Produce + Zero-Burn Token';
    const $=id=>document.getElementById(id);const status=s=>`<span class="status ${String(s).toLowerCase().replaceAll(' ','-')}">${s}</span>`;const plotBy=id=>plots.find(p=>p.id===id)||plots[0];
    function nav(){ $('nav').innerHTML=pages.filter(p=>p[0]!=='plot-detail').map(p=>`<a href="#${p[0]}" data-page="${p[0]}">☘ ${p[1]}</a>`).join('');$('mobile').innerHTML=mobile.map(p=>`<a href="#${p[0]}" data-page="${p[0]}">☘<span>${p[1]}</span></a>`).join('');}
    function setActive(page){document.querySelectorAll('[data-page]').forEach(a=>a.classList.toggle('active',a.dataset.page===page))}
    function title(t,k,a=''){return `<div class="title"><div><p>${k}</p><h1>${t}</h1></div><div class="actions">${a}</div></div>`}
    function metrics(){return `<div class="metrics">${summary.map(m=>`<div class="metric"><div class="bubble ${m[4]}">${m[0]}</div><div><span>${m[1]}</span><strong>${m[2]}</strong><small>${m[3]}</small></div></div>`).join('')}</div>`}
    function plotCard(p){return `<button class="plot ${p.id===selected?'selected':''}" onclick="selected='${p.id}';render(location.hash.slice(1)||'dashboard')"><div class="thumb">🌾</div><div><b>${p.name}</b><br><small>${p.cropType} • ${p.areaRai} rai</small><br><small>${p.plantingDate} → ${p.actualHarvestDate}</small></div>${status(p.status)}</button>`}
    function map(tall=false){return `<div class="map ${tall?'tall':''}"><div class="toolbar"><button class="btn">Draw Boundary</button><button class="btn">Upload Drone Data</button><button class="btn">Layers</button></div><svg viewBox="0 0 860 520"><defs><linearGradient id="field" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d5ead0"/><stop offset=".45" stop-color="#b8d9a8"/><stop offset="1" stop-color="#eef5df"/></linearGradient><pattern id="rows" width="58" height="58" patternUnits="userSpaceOnUse" patternTransform="rotate(28)"><rect width="58" height="58" fill="url(#field)"/><path d="M0 14H58M0 32H58M0 50H58" stroke="#8fb67d" stroke-opacity=".25" stroke-width="3"/></pattern></defs><rect width="860" height="520" rx="28" fill="url(#rows)"/><path d="M0 338 C170 278 220 380 384 320 S652 220 860 294" stroke="#fff" stroke-width="18" stroke-opacity=".82" fill="none"/><path d="M0 126 C166 94 328 178 492 132 S700 54 860 94" stroke="#fff" stroke-width="14" stroke-opacity=".68" fill="none"/>${plots.map(p=>`<g onclick="selected='${p.id}';render(location.hash.slice(1)||'dashboard')"><polygon points="${p.poly}" class="shape ${p.status} ${p.id===selected?'selected':''}"/><text x="${p.poly.split(' ')[0].split(',')[0]}" y="${+p.poly.split(' ')[0].split(',')[1]+28}" class="label">${p.name}</text></g>`).join('')}</svg><div class="legend"><span><i class="dot"></i>Verified</span><span><i class="dot pending"></i>Pending</span><span><i class="dot flagged"></i>Flagged</span></div></div>`}
    function panel(h,b,a=''){return `<section class="panel"><div class="head"><h2>${h}</h2>${a}</div>${b}</section>`}
    function detail(p){return `<div class="details">${[['Crop',p.cropType],['Area size',p.areaRai+' rai'],['GPS',p.gps],['Planting',p.plantingDate],['Harvest',p.actualHarvestDate],['Token lot',p.tokenLotId],['Product lot',p.productLotId]].map(r=>`<div><span>${r[0]}</span><b>${r[1]}</b></div>`).join('')}</div>`}
    function timeline(items=activities){return `<div class="timeline">${items.map((x,i)=>`<div class="tl"><i>${i+1}</i><p>${x}</p><small>${i+1} days ago</small></div>`).join('')}</div>`}
    function table(cols,rows){return `<div class="table"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
    function qr(){return `<div class="qr">${Array.from({length:49}).map((_,i)=>`<i class="${i%3===0||i%7===0?'on':''}"></i>`).join('')}</div>`}
    function filter(){return `<div class="filter"><label>⌕<input placeholder="Search records"></label><select><option>All crops</option><option>Sugarcane</option></select><select><option>All statuses</option><option>Verified</option></select><select><option>2025/26</option></select><button class="btn">Filter</button></div>`}
    function dashboard(){let p=plotBy(selected);return title('Dashboard Overview','Current season 2025/26','<button class="btn primary" onclick="openModal(`Add New Plot`)">＋ Add New Plot</button><button class="btn" onclick="location.hash=`harvest`">Record Harvest</button>')+metrics()+`<div class="grid3"><section>${panel('Plot Status List',`<div class="stack">${plots.map(plotCard).join('')}</div>`,'<a href="#plots">View all</a>')}</section><section>${panel('Main Farm Map Preview',map(),'<a href="#plots">Open farm map</a>')}<div class="split">${panel('Recent Activity',timeline())}${panel('Marketplace Quick Actions','<div class="quick"><button onclick="location.hash=`marketplace`">Sell Produce</button><button onclick="location.hash=`wallet`">Attach Token</button><button onclick="location.hash=`planting`">Record Planting</button><button onclick="location.hash=`harvest`">Record Harvest</button></div>')}</div></section><aside>${panel('Verification Progress','<div class="metric"><div class="bubble">33%</div><div><b>1 of 3 plots verified</b><p class="muted">Pending and flagged plots need review.</p></div></div>')}${panel('Token Balance','<h1>180 ZBT</h1><p class="muted">120 available • 60 sold</p><p><a class="btn primary" href="#wallet">View Wallet</a></p>')}${panel('Selected Plot Detail',detail(p))}</aside></div>`}
    function plotsPage(){let p=plotBy(selected);return title('My Plots / Farm Map','Manage registered farm boundaries','<button class="btn primary" onclick="openModal(`Add / Edit Plot`)">＋ Add Plot</button>')+filter()+`<div class="mapgrid"><section class="plotrail">${panel('Plots (3)',`<div class="stack">${plots.map(plotCard).join('')}</div>`)}</section>${panel('Farm Boundary Map',map(true),'<button class="btn">Draw Boundary</button>')}<aside>${panel(p.name,detail(p)+`<div style="display:flex;gap:14px;align-items:center;margin:16px 0">${qr()}<div><b>Certificate Preview</b><br><span class="muted">${p.certificateId}</span></div></div><div class="actions"><button class="btn">Edit Plot</button><a class="btn primary" href="#plot-detail">View Details</a></div>`,status(p.status))}</aside></div>`}
    function plotDetail(){let p=plotBy(selected);return title(p.name,'Plot detail and traceability',status(p.status)+' <button class="btn primary">Sell Produce</button>')+`<div class="two">${panel('Farm Boundary Preview',map(true))}${panel('Basic Plot Information',detail(p))}${panel('Timeline',timeline(['Plot registered','Boundary submitted','Planting recorded','Harvest recorded','Verification submitted','Token issued','Product listed']))}${panel('Verification & Links',`<div class="cards"><div class="item"><b>${p.status==='verified'?'Verified Zero-Burn':p.status}</b><span class="muted">Risk: ${p.risk}</span></div><div class="item"><b>${p.tokenLotId}</b><span class="muted">Linked token lot</span></div><div class="item"><b>${p.productLotId}</b><span class="muted">Linked product lot</span></div><div class="item"><b>${p.certificateId}</b><span class="muted">Certificate preview</span></div></div>`)}</div>`}
    function records(type){let isHarvest=type==='harvest';let rows=isHarvest?[['HAR-001','Plot A','Sugarcane Lot ZB-2026-001','20 ton','Nakhon Biofuel Factory',status('linked'),'<button class="btn">List</button>'],['HAR-002','Plot C','Sugarcane Lot ZB-2026-002','15 ton','Pending buyer',status('submitted'),'<button class="btn">Link</button>']]:[['PLR-001','Plot A','Sugarcane','12 Jun 2025','Manual rows',status('complete'),'<button class="btn">Edit</button>'],['PLR-002','Plot B','Sugarcane','25 Jun 2025','Mechanical',status('waiting-review'),'<button class="btn">Edit</button>'],['PLR-003','Plot C','Sugarcane','03 Jul 2025','Manual rows',status('incomplete'),'<button class="btn">Edit</button>']];return (isHarvest?`<div class="metrics">${[['🌾','Total harvested quantity','35 tons','This season',''],['✓','Verified harvest','20 tons','Linked to token',''],['✓','Pending harvest','15 tons','Reviewing proof','amber'],['🛒','Listed products','2','Marketplace','blue']].map(m=>`<div class="metric"><div class="bubble ${m[4]}">${m[0]}</div><div><span>${m[1]}</span><strong>${m[2]}</strong><small>${m[3]}</small></div></div>`).join('')}</div>`:'')+title(isHarvest?'Harvest Records':'Planting Records',isHarvest?'Record quantity and supporting proof':'Record planting information for each plot',`<button class="btn primary" onclick="openModal('${isHarvest?'Add Harvest Record':'Add Planting Record'}')">＋ Add Record</button>`)+filter()+panel(isHarvest?'Harvest Records':'Planting Records',table(isHarvest?['Record','Plot','Product','Quantity','Buyer','Status','Action']:['Record','Plot','Crop','Planting date','Method','Status','Action'],rows))}
    function verification(){let rows=[['Plot A','2025/26','Sugarcane','10 Jan 2026','Satellite','Low',status('verified'),'<button class="btn">View</button>'],['Plot B','2025/26','Sugarcane','08 Jan 2026','Drone','Medium',status('monitoring'),'<button class="btn">View</button>'],['Plot C','2025/26','Sugarcane','11 Jan 2026','Field data','High',status('flagged'),'<button class="btn">View</button>']];return title('Zero-Burn Verification','Monitor verification status and evidence','<button class="btn">Download Report</button>')+`<div class="two">${panel('Verification Status Dashboard',table(['Plot','Season','Crop','Inspection','Source','Risk','Status','Action'],rows))}${panel('Evidence Panel',map()+detail(plotBy(selected))+'<button class="btn warn">Submit Appeal / Request Review</button>')}</div>`+panel('Historical Timeline',timeline(['Satellite check queued','Boundary matched to plot','Drone evidence uploaded','Verifier review completed']))}
    function wallet(){return title('Token Wallet','Zero-Burn credits and traceability rewards','<button class="btn primary">Sell Token with Produce</button>')+`<div class="metrics"><div class="metric"><div><span>Total balance</span><strong>180 ZBT</strong><small>120 available • 60 sold • 0 pending</small></div></div>${tokens.map(t=>`<div class="item"><b>${t[0]}</b><span>${t[3]} • ${t[2]}</span>${status(t[4])}</div>`).join('')}</div>`+panel('Token Lots',table(['Token Lot ID','Plot','Harvest','Amount','Status','Linked product'],tokens.map(t=>[t[0],t[1],t[2],t[3],status(t[4]),t[5]])))+panel('Transaction History',timeline(['Token issued for Plot A','50 ZBT linked to product lot','60 ZBT sold with 2024/25 produce','Traceability certificate downloaded']))}
    function marketplace(){return title('Marketplace','Sell produce with optional Zero-Burn token value','<button class="btn primary">＋ Create Listing</button>')+`<div class="actions" style="margin-bottom:18px"><button class="btn ${mode==='Produce Only'?'primary':''}" onclick="mode='Produce Only';render('marketplace')">Sell Produce Only</button><button class="btn ${mode!=='Produce Only'?'primary':''}" onclick="mode='Produce + Zero-Burn Token';render('marketplace')">Sell Produce + Zero-Burn Token</button></div><div class="two">${panel('Product Listings',`<div class="stack">${listings.map(l=>`<div class="listing"><b>${l[1]} ${l[2]}</b><span class="muted">${l[3]} • ${l[5]}</span><div class="actions">${status(l[7])}<button class="btn" onclick="this.textContent='Token attached'">${l[6]}</button></div></div>`).join('')}</div>`)}${panel('Buyer Requests and Quick Actions','<div class="stack"><div class="item"><b>Nakhon Biofuel Factory</b><span>Interested in 20 tons + 50 ZBT</span></div><div class="item"><b>Transport partner</b><span>Available pickup this week</span></div><div class="item"><b>Market price</b><span>฿8,800 / ton sugarcane</span></div></div>')}</div>`+panel('Sales History',timeline(['MKT-001 created','Buyer viewed certificate','Offer received for Plot A lot']))}
    function certificates(){return title('Certificates / Traceability','Download proof and share QR codes','<button class="btn primary">Download PDF</button>')+`<div class="two"><div class="cards">${['CERT-ZB-001','CERT-ZB-002'].map((c,i)=>`<div class="cert"><b>${c}</b>${status(i?'Pending':'Verified')}<p class="muted">${i?'Pending harvest':'ZB-2026-001'} • ${i?'TRC-NSW-PENDING':'TRC-NSW-001'}</p>${qr()}<button class="btn">View Certificate</button></div>`).join('')}</div>${panel('Certificate Preview',`<div style="display:grid;justify-items:center;gap:16px">${qr()}${detail(plotBy('plot-a'))}<div class="actions"><button class="btn">Copy Link</button><button class="btn primary">Share QR</button></div></div>`)}</div>`}
    function profile(){return title('Farmer Profile','Identity, wallet, payment, and notification settings','<button class="btn primary">Edit Profile</button>')+`<div class="two">${panel('Farmer Profile Card','<div style="display:grid;place-items:center;gap:12px;min-height:260px;text-align:center"><div class="avatar" style="width:86px;height:86px;font-size:25px">SF</div><b>Somchai Farm</b><span class="muted">Nakhon Sawan • Sugarcane</span>'+status('Verified')+'</div>')}${panel('Contact Information','<div class="details"><div><span>Name</span><b>Somchai Farm</b></div><div><span>Phone</span><b>+66 81 234 5678</b></div><div><span>Address</span><b>Moo 4, Takhli District</b></div><div><span>Province</span><b>Nakhon Sawan</b></div></div>')}${panel('Payment and Wallet','<div class="details"><div><span>Payment</span><b>Kasikorn Bank •••• 4281</b></div><div><span>Wallet</span><b>0xZBF...9A21</b></div><div><span>Account</span><b>Active</b></div></div>')}${panel('Notification Settings','<label><input type="checkbox" checked onchange="void 0"> Verification and marketplace alerts</label>')}</div>`}
    function form(title){return `<form class="form" onsubmit="event.preventDefault();closeModal()">${['Select plot','Select season','Crop type','Date','Quantity / area','Notes','Upload proof'].map(f=>`<label>${f}<input placeholder="${f}"></label>`).join('')}<button class="btn primary">Save Mock Record</button></form>`}
    function openModal(t){$('modal-title').textContent=t;$('modal-body').innerHTML=t==='Quick Action'?'<div class="stack"><button class="btn" onclick="location.hash=`plots`;closeModal()">Add New Plot</button><button class="btn" onclick="location.hash=`planting`;closeModal()">Record Planting</button><button class="btn" onclick="location.hash=`harvest`;closeModal()">Record Harvest</button><button class="btn" onclick="location.hash=`marketplace`;closeModal()">Sell Produce</button></div>':form(t);$('modal').classList.add('open')}
    function closeModal(){$('modal').classList.remove('open')}
    function render(page=(location.hash.slice(1)||'dashboard')){setActive(page);const views={dashboard,plots:plotsPage,'plot-detail':plotDetail,planting:()=>records('planting'),harvest:()=>records('harvest'),verification,wallet,marketplace,certificates,profile};$('app').innerHTML=(views[page]||dashboard)();setActive(page)}
    window.addEventListener('hashchange',()=>render());nav();render();
  </script>
</body>
</html>
